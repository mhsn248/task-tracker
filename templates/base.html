<!doctype html>

<html lang="fa" dir="rtl">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>

        {% block title %}
            Task Tracker
        {% endblock %}

    </title>

    {% load static %}

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
        rel="stylesheet"
    >

    <link
        rel="manifest"
        href="{% static 'manifest.json' %}"
    >

    <meta
        name="theme-color"
        content="#198754"
    >

    <style>

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Regular.woff2' %}")
                format('woff2');

            font-weight: 400;

        }

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Medium.woff2' %}")
                format('woff2');

            font-weight: 500;

        }

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Bold.woff2' %}")
                format('woff2');

            font-weight: 700;

        }

        body {

            font-family:
                'Vazirmatn',
                Tahoma,
                sans-serif;

            background-color: #f8f9fa;

            min-height: 100vh;

        }

        .app-header {

            background-color: white;

            border-radius: 1rem;

            padding: 1rem;

            box-shadow: 0 0.125rem 0.25rem rgba(
                0,
                0,
                0,
                0.075
            );

            margin-bottom: 1.5rem;

        }

        .content-container {

            max-width: 600px;

        }

    </style>

</head>

<body>

    <div class="container py-3 content-container">

        <div class="app-header">

            <div
                class="
                    d-flex
                    justify-content-between
                    align-items-center
                    flex-wrap
                    gap-2
                "
            >

                <div>

                    <h1 class="h4 mb-1">

                        Task Tracker

                    </h1>

                    {% if user.is_authenticated %}

                        <div class="text-muted">

                            سلام،

                            {{ user.username }}

                            👋

                        </div>

                    {% endif %}

                </div>

                {% if user.is_authenticated %}

                    <div
                        class="
                            d-flex
                            flex-wrap
                            gap-2
                        "
                    >

                        <a
                            class="
                                btn
                                btn-outline-primary
                                btn-sm
                            "
                            href="{% url 'daily_tasks' %}"
                        >

                            امروز

                        </a>

                        <a
                            class="
                                btn
                                btn-outline-secondary
                                btn-sm
                            "
                            href="{% url 'task_list' %}"
                        >

                            کارها

                        </a>

                        {% if user.groups.all.0.name == 'Teacher' %}

                            <a
                                class="
                                    btn
                                    btn-outline-info
                                    btn-sm
                                "
                                href="{% url 'teacher_students' %}"
                            >

                                شاگردها

                            </a>

                        {% endif %}

                        <form
                            method="post"
                            action="{% url 'logout' %}"
                            class="d-inline"
                        >

                            {% csrf_token %}

                            <button
                                class="
                                    btn
                                    btn-outline-danger
                                    btn-sm
                                "
                                type="submit"
                            >

                                خروج

                            </button>

                        </form>

                    </div>

                {% endif %}

            </div>

        </div>

        {% block content %}
        {% endblock %}

    </div>

    <script>

    if ('serviceWorker' in navigator) {

        navigator.serviceWorker.register(
            "{% static 'sw.js' %}"
        );

    }

    </script>

</body>

</html>
