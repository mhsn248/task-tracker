<!doctype html>

<html lang="fa" dir="rtl">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>

        {% block title %}
            Task Tracker
        {% endblock %}

    </title>

    {% load static %}

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
        rel="stylesheet"
    >

    <link
        rel="manifest"
        href="{% static 'manifest.json' %}"
    >

    <meta
        name="theme-color"
        content="#198754"
    >

    <style>

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Regular.woff2' %}")
                format('woff2');

            font-weight: 400;

        }

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Medium.woff2' %}")
                format('woff2');

            font-weight: 500;

        }

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Bold.woff2' %}")
                format('woff2');

            font-weight: 700;

        }

        body {

            font-family:
                'Vazirmatn',
                Tahoma,
                sans-serif;

            background-color: #f8f9fa;

            min-height: 100vh;

        }

        .app-header {

            background-color: white;

            border-radius: 1rem;

            padding: 1rem;

            box-shadow: 0 0.125rem 0.25rem rgba(
                0,
                0,
                0,
                0.075
            );

            margin-bottom: 1.5rem;

        }

        .content-container {

            max-width: 600px;

        }

        .app-nav {

            display: flex;

            flex-wrap: wrap;

            gap: 0.5rem;

        }

        .nav-card {

            display: inline-flex;

            align-items: center;

            gap: 0.5rem;

            padding: 0.55rem 0.9rem;

            border-radius: 999px;

            background: white;

            border: 1px solid #e9ecef;

            text-decoration: none;

            color: #495057;

            font-size: 0.9rem;

            font-weight: 500;

            box-shadow:
                0 1px 4px rgba(
                    0,
                    0,
                    0,
                    0.04
                );

            transition:
                all 0.15s ease;

        }

        .nav-card:hover {

            transform: translateY(-1px);

        }

        .nav-icon {

            font-size: 1rem;

            margin: 0;

        }

        .logout-link {

            border: none;

            background: none;

            color: #dc3545;

            font-weight: 500;

            padding: 0;

        }

    </style>

</head>

<body>

    <div class="container py-3 content-container">

        <div class="app-header">

            <div
                class="
                    d-flex
                    justify-content-between
                    align-items-center
                    flex-wrap
                    gap-2
                "
            >

                <div>

                    <h1 class="h4 mb-1">

                        Task Tracker

                    </h1>

                    {% if user.is_authenticated %}

                        <div class="text-muted">

                            سلام،

                            {{ user.username }}

                            👋

                        </div>

                    {% endif %}

                </div>

                {% if user.is_authenticated %}

                    <div class="app-nav">

                        <a
                            href="{% url 'daily_tasks' %}"
                            class="nav-card"
                        >

                            <div class="nav-icon">

                                📅

                            </div>

                            <div>

                                امروز

                            </div>

                        </a>

                        <a
                            href="{% url 'task_list' %}"
                            class="nav-card"
                        >

                            <div class="nav-icon">

                                📋

                            </div>

                            <div>

                                کارها

                            </div>

                        </a>

                        {% if user.groups.all.0.name == 'Teacher' %}

                            <a
                                href="{% url 'teacher_students' %}"
                                class="nav-card"
                            >

                                <div class="nav-icon">

                                    👨‍🏫

                                </div>

                                <div>

                                    شاگردها

                                </div>

                            </a>

                        {% endif %}

                    </div>

                    <form
                        method="post"
                        action="{% url 'logout' %}"
                        class="mt-3"
                    >

                        {% csrf_token %}

                        <button
                            class="logout-link"
                            type="submit"
                        >

                            خروج ↩

                        </button>

                    </form>

                {% endif %}

            </div>

        </div>

        {% block content %}
        {% endblock %}

    </div>

    <script>

    if ('serviceWorker' in navigator) {

        navigator.serviceWorker.register(
            "{% static 'sw.js' %}"
        );

    }

    </script>

</body>

</html>
