<!doctype html>

<html lang="fa" dir="rtl">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>

        {% block title %}
            Task Tracker
        {% endblock %}

    </title>

    {% load static %}

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
        rel="stylesheet"
    >

    <link
        rel="manifest"
        href="{% static 'manifest.json' %}"
    >

    <meta
        name="theme-color"
        content="#198754"
    >

    <style>

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Regular.woff2' %}")
                format('woff2');

            font-weight: 400;

        }

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Medium.woff2' %}")
                format('woff2');

            font-weight: 500;

        }

        @font-face {

            font-family: 'Vazirmatn';

            src: url("{% static 'fonts/Vazirmatn-Bold.woff2' %}")
                format('woff2');

            font-weight: 700;

        }

        body {

            font-family:
                'Vazirmatn',
                Tahoma,
                sans-serif;

            background-color: #f8f9fa;

            min-height: 100vh;

        }

        .content-container {

            max-width: 720px;

        }

        .app-header {

            background: white;

            border-radius: 20px;

            padding: 1rem;

            box-shadow:
                0 2px 12px rgba(
                    0,
                    0,
                    0,
                    0.05
                );

            margin-bottom: 1rem;

        }

        .header-content {

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 1rem;

        }

        .welcome-text {

            color: #6b7280;

            font-size: 0.95rem;

            margin: 0;

            white-space: nowrap;

        }

        .app-nav {

            display: flex;

            flex-wrap: wrap;

            gap: 0.5rem;

        }

        .nav-card {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            gap: 0.45rem;

            padding: 0.55rem 0.95rem;

            border-radius: 999px;

            background: #f8f9fa;

            border: 1px solid #edf0f2;

            text-decoration: none;

            color: #495057;

            font-size: 0.9rem;

            font-weight: 500;

            transition:
                background-color 0.15s ease,
                transform 0.15s ease;

        }

        .nav-card:hover {

            background: #f1f3f5;

            color: #212529;

            transform: translateY(-1px);

        }

        .nav-icon {

            font-size: 1rem;

            line-height: 1;

        }

        .logout-form {

            margin: 0;

        }

        .logout-link {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            gap: 0.45rem;

            padding: 0.55rem 0.95rem;

            border-radius: 999px;

            background: #fff5f5;

            border: 1px solid #ffe3e3;

            color: #dc3545;

            font-size: 0.9rem;

            font-weight: 500;

            cursor: pointer;

            transition:
                background-color 0.15s ease,
                transform 0.15s ease;

        }

        .logout-link:hover {

            background: #ffe3e3;

            transform: translateY(-1px);

        }

        @media (max-width: 576px) {

            .header-content {

                flex-direction: column;

                align-items: stretch;

            }

            .welcome-text {

                text-align: center;

            }

            .app-nav {

                display: grid;

                grid-template-columns:
                    repeat(
                        2,
                        1fr
                    );

                gap: 0.75rem;

                direction: rtl;

            }

            .nav-card {

                justify-content: center;

            }

            .teacher-card {

                grid-column: 1 / -1;

                min-height: 48px;

            }

            .logout-form {

                grid-column: 1 / -1;

            }

            .logout-link {

                width: 100%;

                min-height: 48px;

                font-size: 0.95rem;

            }

        }

    </style>

</head>

<body>

    <div class="container py-3 content-container">

        {% if user.is_authenticated %}

            <div class="app-header">

                <div class="header-content">

                    <div class="welcome-text">

                        سلام،

                        {{ user.username }}

                        👋

                    </div>

                    <div class="app-nav">

                        {% if user.groups.all.0.name == 'Teacher' %}

                            <a
                                href="{% url 'teacher_students' %}"
                                class="nav-card teacher-card"
                            >

                                <span class="nav-icon">

                                    👨‍🏫

                                </span>

                                شاگردها

                            </a>

                        {% else %}

                            <a
                                href="{% url 'daily_tasks' %}"
                                class="nav-card"
                            >

                                <span class="nav-icon">

                                    📅

                                </span>

                                امروز

                            </a>

                            <a
                                href="{% url 'task_list' %}"
                                class="nav-card"
                            >

                                <span class="nav-icon">

                                    📋

                                </span>

                                کارها

                            </a>

                        {% endif %}

                        <form
                            method="post"
                            action="{% url 'logout' %}"
                            class="logout-form"
                        >

                            {% csrf_token %}

                            <button
                                class="logout-link"
                                type="submit"
                            >

                                خروج

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        {% endif %}

        {% block content %}
        {% endblock %}

    </div>

    <script>

    if ('serviceWorker' in navigator) {

        navigator.serviceWorker.register("/static/sw.js")

    }

    </script>

</body>

</html>
