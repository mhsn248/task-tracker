<!doctype html>

<html lang="fa" dir="rtl">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>

        {% block title %}
            Task Tracker
        {% endblock %}

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
        rel="stylesheet"
    >

</head>

<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">

        <div class="container">

            <a
                class="navbar-brand"
                href="/"
            >

                Task Tracker

            </a>

            {% if user.is_authenticated %}

                <div class="navbar-nav ms-auto">

                    <span class="navbar-text me-3">

                        {{ user.username }}

                    </span>

                    <a
                        class="nav-link"
                        href="{% url 'task_list' %}"
                    >

                        کارها

                    </a>

                    <a
                        class="nav-link"
                        href="{% url 'daily_tasks' %}"
                    >

                        کارهای روزانه

                    </a>

                    {% if user.groups.all.0.name == 'Teacher' %}

                        <a
                            class="nav-link"
                            href="{% url 'teacher_students' %}"
                        >

                            شاگردها

                        </a>

                    {% endif %}

                    <form
                        method="post"
                        action="{% url 'logout' %}"
                    >

                        {% csrf_token %}

                        <button
                            class="btn btn-outline-light btn-sm"
                            type="submit"
                        >

                            خروج

                        </button>

                    </form>

                </div>

            {% endif %}

        </div>

    </nav>

    <div class="container mt-4">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
