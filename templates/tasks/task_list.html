{% extends 'base.html' %}

{% block title %}
کارهای من
{% endblock %}

{% block content %}

<h1>کارهای من</h1>

<ul>

    {% for task in tasks %}

        <li>

            {{ task.title }}

            <a href="{% url 'task_update' task.id %}">
                ویرایش
            </a>

            <a href="{% url 'task_deactivate' task.id %}">
                غیرفعال کردن
            </a>

            <a href="{% url 'task_delete' task.id %}">
                حذف
            </a>

        </li>

    {% empty %}

        <li>
            هنوز کاری تعریف نکرده‌اید.
        </li>

    {% endfor %}

</ul>

<p>
    <a href="{% url 'task_create' %}">
        افزودن کار جدید
    </a>
</p>

<p>
    <a href="{% url 'daily_tasks' %}">
        کارهای امروز
    </a>
</p>

{% endblock %}
