{% extends 'base.html' %}

{% block title %}
کارهای من
{% endblock %}

{% block content %}

<h1>کارهای من</h1>

<ul>

    {% for task in tasks %}

        <li>
            {{ task.title }}
        </li>

    {% empty %}

        <li>
            هنوز کاری تعریف نکرده‌اید.
        </li>

    {% endfor %}

</ul>

<p>
    <a href="{% url 'task_create' %}">
        افزودن کار جدید
    </a>
</p>

{% endblock %}
