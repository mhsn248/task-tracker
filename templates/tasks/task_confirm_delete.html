{% extends 'base.html' %}

{% block title %}
حذف کار
{% endblock %}

{% block content %}

<h1>حذف کار</h1>

<p>

آیا از حذف

<strong>{{ task.title }}</strong>

مطمئن هستید؟

</p>

<form method="post">

    {% csrf_token %}

    <button
        class="btn btn-danger"
        type="submit"
    >

        حذف

    </button>

</form>

<p>

    <a
        class="btn btn-secondary"
        href="{% url 'task_list' %}"
    >

        انصراف

    </a>

</p>

{% endblock %}
