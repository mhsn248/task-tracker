{% extends 'base.html' %}

{% load task_extras %}

{% block title %}
کارهای روزانه
{% endblock %}

{% block content %}

<h1>کارهای روزانه</h1>

<form method="get">

    <label>
        تاریخ:
    </label>

    <input
        type="date"
        name="date"
        value="{{ selected_date|date:'Y-m-d' }}"
    >

    <button type="submit">
        نمایش
    </button>

</form>

<hr>

<div class="card">

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {% for task in tasks %}

                <div class="form-check mb-3">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="task_{{ task.id }}"
                        id="task_{{ task.id }}"
                        {% if statuses|get_item:task.id %}
                            checked
                        {% endif %}
                    >

                    <label
                        class="form-check-label"
                        for="task_{{ task.id }}"
                    >

                        {{ task.title }}

                    </label>

                </div>

            {% empty %}

                <div class="alert alert-info">

                    هنوز کاری تعریف نکرده‌اید.

                </div>

            {% endfor %}

            {% if tasks %}

                <button
                    class="btn btn-success"
                    type="submit"
                >

                    ذخیره

                </button>

            {% endif %}

        </form>

    </div>

</div>

{% endblock %}
